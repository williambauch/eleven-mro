# DBHub Configuration - Read-Only Mode
# Apenas SELECT, SHOW, DESCRIBE, EXPLAIN são permitidos

[[sources]]
id = "mro-postgres-readonly"
dsn = "postgresql://postgres:12345678@localhost:5432/elevenmy_mro"

[[sources]]
id = "gestor-xml-readonly"
dsn = "mysql://root:12345678@localhost:3306/elevenmy_gestor_xml"

[[tools]]
name = "execute_sql"
source = "mro-postgres-readonly"
max_rows = 100
readonly = true

[[tools]]
name = "search_objects"
source = "mro-postgres-readonly"
